name: PR coverage

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-coverage-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
        env:
          PUPPETEER_SKIP_DOWNLOAD: true
      - name: Run mutation tests on changed files only
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          git fetch origin "$BASE_SHA" --depth=1 2>/dev/null || true
          CHANGED=$(git diff --name-only "$BASE_SHA" HEAD -- '*.ts' '*.tsx' 2>/dev/null \
            | grep -v '\.test\.' | grep -v '\.spec\.' | tr '\n' ',' | sed 's/,$//')
          if [ -z "$CHANGED" ]; then
            CHANGED="components/ui/**/*.tsx"
          fi
          echo "Mutating: $CHANGED"
          npx stryker run --mutate "$CHANGED"
        continue-on-error: true
      - uses: subhashmahimaluri/vite-pr-coverage-insight@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-script: npm run test:coverage
          head: coverage/coverage-summary.json
          thresholds: '80'
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            coverage-report.json
            coverage-report.html
          if-no-files-found: warn
