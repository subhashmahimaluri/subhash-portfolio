name: PR coverage

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-coverage-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
        env:
          PUPPETEER_SKIP_DOWNLOAD: true
      - name: Run mutation tests on changed files only
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.ts' '*.tsx' | grep -v '\.test\.' | grep -v '\.spec\.' | paste -sd ',' -)
          if [ -n "$CHANGED" ]; then
            npx stryker run --mutate "$CHANGED"
          else
            echo "No source files changed — skipping mutation"
          fi
        continue-on-error: true
      - uses: subhashmahimaluri/vite-pr-coverage-insight@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-script: npm run test:coverage
          head: coverage/coverage-summary.json
          thresholds: '80'
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            coverage-report.json
            coverage-report.html
          if-no-files-found: warn
